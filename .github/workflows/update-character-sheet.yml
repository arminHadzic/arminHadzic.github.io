name: Update Character Sheet App

# Run manually, or automatically when the charactersheet repo pushes to main
# (set up a repository dispatch webhook in the charactersheet repo to trigger this)
on:
  workflow_dispatch:
  repository_dispatch:
    types: [charactersheet-updated]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout personal website
        uses: actions/checkout@v4

      - name: Checkout charactersheet repo
        uses: actions/checkout@v4
        with:
          repository: arminHadzic/charactersheet
          path: _build/charactersheet
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: _build/charactersheet/package-lock.json

      - name: Install dependencies
        working-directory: _build/charactersheet
        run: npm ci

      - name: Build character sheet app
        working-directory: _build/charactersheet
        run: npm run build

      - name: Copy built app into site
        run: |
          rm -rf charactersheet
          mkdir -p charactersheet
          cp -r _build/charactersheet/dist/* charactersheet/

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charactersheet/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update character sheet app build"
            git push
          fi
